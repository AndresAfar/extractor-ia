{% extends "base.html" %}
{% block content %}
<div class="grid md:grid-cols-2 gap-8">
  <section>
    <h2 class="text-lg font-medium mb-3">Cargar factura</h2>
    <form
      hx-post="/extract"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      hx-indicator="#spinner"
      class="bg-white border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center hover:border-slate-400 transition"
    >
      <input
        type="file" name="file" required
        accept="application/pdf,image/png,image/jpeg,image/webp"
        class="block w-full text-sm text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100"
      >
      <button class="mt-4 bg-orange-600 hover:bg-orange-700 text-white px-6 py-2 rounded-lg text-sm font-medium">
        Extraer datos
      </button>
      <div id="spinner" class="htmx-indicator mt-3 text-sm text-slate-500">
        Procesando con IA...
      </div>
    </form>

    <div id="result" class="mt-6"></div>
  </section>

  <section>
    <h2 class="text-lg font-medium mb-3">Historial</h2>
    
    <div class="bg-white rounded-2xl border divide-y">
      {% for inv in invoices %}
      <div class="p-4 text-sm">
        <div class="flex justify-between">
          <span class="font-medium truncate">{{ inv.filename }}</span>
          <span class="text-slate-500">{{ inv.fecha_emision }}</span>
        </div>
        <div class="text-orange-700 font-semibold mt-1">
          {{ inv.moneda }} {{ "{:,.0f}".format(inv.valor_total) }}
        </div>
      </div>
      {% else %}
      <p class="p-4 text-sm text-slate-500">Aún no has cargado facturas.</p>
      {% endfor %}
    </div>
  </section>


</div>
{% endblock %}
